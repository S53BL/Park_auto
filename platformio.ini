; ============================================================
; platformio.ini
; Projekt: Avtomatizacija Pokritega Parkirišča
; Datum:   2026-04  |  Verzija: 1.0.4-dev
; ============================================================
;
; SPREMEMBE v 1.0.4 (glede na 1.0.3):
;
;   [1] extra_scripts ODSTRANJEN:
;       extra_scripts = pre:scripts/fw_includes.py
;       Skripta scripts/fw_includes.py ne obstaja v projektu →
;       "missing SConscript file" napaka ob vsakem buildu.
;       Odstranjena ker v Fazi 0 ni potrebna.
;
;   [2] GFX KNJIŽNICA — popravljeno ime paketa:
;       BILO:  moononournation/Arduino_GFX_Library @ 1.6.0
;       ZDAJ:  moononournation/GFX Library for Arduino @ 1.6.0
;       Razlog: PlatformIO registry ime je "GFX Library for Arduino"
;               (z presledki, ne podčrtaji) — potrjeno iz library.properties.
;
;   [3] WEB SERVER — zamenjano na ESP32Async organizacijo:
;       BILO:  mathieucarbou/AsyncTCP @ ^3.3.2
;              https://github.com/mathieucarbou/ESPAsyncWebServer.git
;       ZDAJ:  ESP32Async/AsyncTCP @ ^3.3.2
;              ESP32Async/ESPAsyncWebServer @ ^3.3.2
;       Razlog: mathieucarbou je prenesel projekt pod ESP32Async organizacijo.
;               ESP32Async je uradni naslednik, na PlatformIO registry,
;               GitHub .git URL povzroča ".gitattributes" napako na Windows.
;
;   [4] RADAR + SC16IS752 — zamenjani GitHub .git URL z .zip:
;       BILO:  https://github.com/lizardking/LD2410Async.git
;              https://github.com/TD-er/SC16IS752.git
;       ZDAJ:  https://github.com/lizardking/LD2410Async/archive/refs/heads/master.zip
;              https://github.com/TD-er/SC16IS752/archive/refs/heads/master.zip
;       Razlog: Git clone na Windows bere .gitattributes in vrže napako
;               "# is not a valid attribute name". ZIP download tega ne dela.
;
; ============================================================
; HARDWARE:
;   ESP-Primary : Waveshare ESP32-S3-Touch-LCD-3.5B
;                 https://www.waveshare.com/wiki/ESP32-S3-Touch-LCD-3.5B
;   Display     : 3.5" IPS, 320x480 px, driver AXS15231B (QSPI — NE SPI!)
;   Touch       : Integriran v AXS15231B čip, I2C interni bus (IO7/IO8)
;                 Reset prek TCA9554 GPIO expander (interni bus, 0x20)
;   PSRAM       : 8 MB OPI
;   Flash       : 16 MB
;
; FRAMEWORK:
;   PlatformIO + Arduino (C++)
;   Skladno z odločitvijo v firmware_arhitektura.md — ne ESP-IDF, ne MicroPython.
;
; DEMO REFERENCA:
;   Waveshare uradno zagotavlja demo paket z dvema LVGL demo-ma:
;     - 09_lvgl_arduino_v8  →  lv_conf.h konfiguriran za LVGL v8.4.0
;     - 10_lvgl_arduino_v9  →  lv_conf.h konfiguriran za LVGL v9.2.2
;   Mi izberemo LVGL v9.2.2 (novejši, aktivno vzdrževan).
;   lv_conf.h: vzemi iz Waveshare demo mape 10_lvgl_arduino_v9/
;              in ga kopiraj v include/ mapo tega projekta.
;
; PARTICIJSKA SHEMA:
;   Datoteka partitions_custom.csv v root projekta:
;
;     # Name,    Type,  SubType,  Offset,    Size
;     nvs,       data,  nvs,      0x9000,    0x5000,
;     otadata,   data,  ota,      0xe000,    0x2000,
;     app0,      app,   ota_0,    0x10000,   0x300000,
;     app1,      app,   ota_1,    0x310000,  0x300000,
;     littlefs,  data,  spiffs,   0x610000,  0x9F0000,
;
;   Razdelitev: 2x 3 MB OTA + ~10 MB LittleFS
;   LittleFS hrani: web assets (gzip), modele vozil JSON, config, logi
;
; STRUKTURA PROJEKTA (skladno z firmware_arhitektura.md):
;   include/lv_conf.h     ← LVGL konfiguracija (iz Waveshare demo paketa)
;   src/main.cpp          ← setup() + loop(), task kreacija
;   src/bsp.cpp/.h        ← BSP: pin definicije, I2C init, FreeRTOS taski
;   src/hal_*.cpp/.h      ← HAL: gonilniki za vsak čip
;   src/event_bus.cpp/.h  ← EventBus: publish/subscribe sistem
;   src/led_manager.cpp   ← FastLED animacije + MUX preklop
;   src/sensor_mgr.cpp    ← Agregacija senzorjev
;   src/config_mgr.cpp    ← LittleFS + NVS persistenca
;   src/logger.cpp        ← Centralni logger: Serial + SD + web feed
;   src/light_logic.cpp   ← Sekvence osvetlitve, SSR logika
;   src/alarm.cpp         ← Alarmni sistem
;   src/vehicle_recog.cpp ← DTW prepoznava vozil
;   src/web_ui.cpp        ← ESPAsyncWebServer, REST API
;   src/assets/           ← LVGL ikone, web HTML/CSS/JS (gzip), SD predloge
;   data/                 ← LittleFS vsebina za uploadfs
;   partitions_custom.csv ← Particijska shema
;
;   Lokalne Waveshare BSP datoteke (v src/ — niso v lib_deps):
;   src/TCA9554.h/.cpp              ← Rob Tillaart TCA9554 v0.1.2
;   src/esp_lcd_touch_axs15231b.h/.cpp ← Waveshare AXS15231B touch BSP
; ============================================================

[env:parking_esp32s3]

; ------------------------------------------------------------
; PLATFORMA IN BOARD
; ------------------------------------------------------------
; pioarduino — community fork arduino-esp32 v3.x (ekvivalent Arduino IDE v3.1.1)
;
;   ZAKAJ NE espressif32 @ 6.4.0?
;     espressif32@6.4.0 = arduino-esp32 v2.0.11 (IDF 5.1)
;     Bootloaderji v v2.0.11 (bootloader_qio_80m.elf + bootloader_dio_80m.elf)
;     se OBA zrušita na adresi 0x403cd962 na Waveshare ESP32-S3-Touch-LCD-3.5B.
;     Crash = bug v OPI PSRAM inicializaciji v 2nd-stage bootloaderju v2.0.11.
;     Nobena kombinacija memory_type (qio_opi, dio_opi, qio_qspi, ...) NE pomaga
;     ker je bug v SKUPNI kodi bootloaderja, ne v flash mode switchu.
;     Diagnostika: Saved PC:0x403cd962, mode:DIO, clock div:1 (→ 80MHz)
;                  bootloader se naloži (entry 0x403c98bc) a zruši v PSRAM init.
;
;   ZAKAJ pioarduino?
;     pioarduino = arduino-esp32 v3.x (IDF 5.3) — ENAKO kot Arduino IDE v3.1.1
;     Waveshare uradno podpira in testira na Arduino IDE v3.1.1.
;     boards.txt v3.1.1 potrjuje: memory_type = qio_opi za to ploščo.
;     Bootloaderji v v3.x imajo fiksano OPI PSRAM inicializacijo.
;
;   ⚠ pioarduino ≠ espressif32@6.x !
;     To je LOČENA community platforma, ne nadgradnja uradnega espressif32 paketa.
;     Opomba "ne nadgrajevati 6.5+" se NE nanaša nanjo.
;     Ref: https://github.com/pioarduino/platform-espressif32
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
;   platform = espressif32 @ 6.4.0  ← NE DELUJE: bug v v2.0.11 bootloaderju (PSRAM init)

; esp32-s3-devkitc-1 — najbližji generični board za Waveshare S3.
;   Waveshare ne zagotavlja uradnega PlatformIO board JSON-a za
;   ESP32-S3-Touch-LCD-3.5B. Devkitc-1 je funkcionalno enakovreden —
;   vse pine konfiguriramo sami v bsp.cpp in config.h.
;   ⚠ Uporabi devkitc-1, NE devkitm-1 (različni USB CDC konfiguraciji).
board = esp32-s3-devkitc-1

framework = arduino
extra_scripts =
    pre:scripts/compress_assets.py
src_filter = +<*> -<files/>

; ------------------------------------------------------------
; FLASH IN MEMORY KONFIGURACIJA
; ------------------------------------------------------------
; KONFIGURACIJA: qio_opi — PRAVILNA za Waveshare ESP32-S3-Touch-LCD-3.5B
;
;   Potrjeno iz Arduino IDE v3.1.1 boards.txt (Waveshare definicija):
;     build.flash_mode = dio     ← esptool header DIO (ROM bere v DIO)
;     build.boot = qio           ← bootloader preklopi v QIO
;     psram_type = opi           ← OPI PSRAM
;   → memory_type = qio_opi  (boot=qio + psram=opi)
;
;   Zakaj flash_mode=dio Z boot=qio?
;     ROM vedno bere flash header v DIO. Header vsebuje naslov "dio" da ROM
;     pravilno naloži bootloader. Šele nato 2nd-stage bootloader PREKLOPI v QIO.
;
;   Simptom napačne konfiguracije: rst:0x3 | Saved PC:0x403cdac2 (boot loop)
;
;   ⚠ NE DODAJAJ -mfix-esp32-psram-cache-issue — ta flag je za orig. ESP32 (LX6),
;     na ESP32-S3 povzroči boot loop (Saved PC:0x403cdacX pred Serial.begin).
board_build.flash_size          = 16MB
board_build.flash_mode          = dio
board_build.f_flash             = 80000000L
board_build.psram_type          = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions          = partitions_custom.csv
board_build.filesystem          = littlefs

; ------------------------------------------------------------
; UPLOAD IN MONITOR
; ------------------------------------------------------------
; 921600 baud — maksimalna hitrost za CP2102/CH343P USB-UART.
;   Znižaj na 460800 če imaš nestabilne uploade.
upload_speed   = 921600
monitor_speed  = 115200
; esp32_exception_decoder — dekodira stack trace crashev v berljive klice.
; colorize — obarva ERROR/WARN/INFO sporočila v terminalu.
monitor_filters = esp32_exception_decoder, colorize

; ------------------------------------------------------------
; BUILD FLAGS
; ------------------------------------------------------------
build_flags =

    ; --- PSRAM ---
    ; BOARD_HAS_PSRAM — sporoči Arduino frameworku da je PSRAM prisoten.
    ;   Brez tega ps_malloc() in PSRAM alokacije ne delujejo.
    -DBOARD_HAS_PSRAM

    ; --- LVGL KONFIGURACIJA ---
    ; LV_CONF_INCLUDE_SIMPLE — LVGL poišče lv_conf.h v include/ mapi projekta.
    ;   Zahteva: include/lv_conf.h mora obstajati.
    -DLV_CONF_INCLUDE_SIMPLE

    ; LV_LVGL_H_INCLUDE_SIMPLE — LVGL poišče lvgl.h direktno.
    -DLV_LVGL_H_INCLUDE_SIMPLE

    ; --- INCLUDE PATH ---
    ; Dodaj include/ mapo v search path za compiler (za lv_conf.h).
    ; -Iinclude zadostuje za src/ datoteke, ampak LVGL kompajlira svoje .c
    ; datoteke iz .pio/libdeps/ kjer relativna pot ne velja.
    ; -I$PROJECT_DIR/include doda absolutno pot — LVGL jo vidi.
    -Iinclude
    -I$PROJECT_DIR/include

    ; --- DISPLAY PINI — AXS15231B prek QSPI ---
    ; Pini potrjeni iz Waveshare demo 10_lvgl_arduino_v9.ino.
    ; ⚠ NE SPI — QSPI (4 podatkovne linije, ni MISO, ni RST).
    ; Gonilnik: Arduino_GFX → Arduino_AXS15231B + Arduino_ESP32QSPI
    -DLCD_HOR_RES=320
    -DLCD_VER_RES=480
    -DLCD_BL_PIN=6
    -DLCD_QSPI_CS=12
    -DLCD_QSPI_CLK=5
    -DLCD_QSPI_D0=1
    -DLCD_QSPI_D1=2
    -DLCD_QSPI_D2=3
    -DLCD_QSPI_D3=4

    ; --- TOUCH PINI — interni I2C bus ---
    ; Touch integriran v AXS15231B, reset prek TCA9554 (interni bus IO7/IO8).
    ; ⚠ Wire (interni bus) NE inicializiramo sami — Waveshare BSP ga upravlja.
    -DTOUCH_SDA=7
    -DTOUCH_SCL=8

    ; --- PROJEKTNE NASTAVITVE ---
    ; Verzija firmware-a — sinhronizirati s config.h FW_VERSION_STRING.
    -DVERSION_STRING=\"1.0.4-dev\"

    ; LOG_LEVEL: 0=ERROR, 1=WARN, 2=INFO, 3=DEBUG
    -DLOG_LEVEL=3

    ; --- FREERTOS CORE DODELITEV ---
    ; Core0: WiFi stack (fiksnih ~55%) + ESPAsyncWebServer
    ; Core1: Senzorji, LED, LVGL, logika, DTW
    ; ⚠ Ne premikaj WiFi na Core1 — povzroči dropout in watchdog reset!
    ; ⚠ NE UPORABI -UARDUINO_EVENT_RUNNING_CORE — povzroča "redefined" warning
    ;   ker framework to spremenljivko že definira. Direktna definicija zadostuje.
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=0

    ; --- USB CDC (ESP32-S3 native USB) ---
    ; Omogoča while(!Serial) čakanje in zajem vseh startup logov.
    ; Brez tega Serial.begin() morda ne odpre CDC takoj ob zagonu.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; --- WEB UI ---
    ; WIFI_HOSTNAME in WEB_PORT definirani v config.h (sekcija 16).
    ; AsyncTCP interni task stack — vrnjeno 4096→8192 (2026-05, crash fix)
    ; Razlog: async_tcp stack canary ob prvem HTTP requestu.
    ;   _handleStatus kliče ~10 HAL funkcij + JsonDocument na async_tcp stacku.
    ;   4096 B ne zadostuje — 8192 B je minimum za naše handlerje.
    ;   SRAM bilanca je OK: 24544 B pred web_ui_begin → ~16000 B po njem →
    ;   dovolj za SD DMA + socket buffer + rezerva ~8000 B.
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0

; ------------------------------------------------------------
; KNJIŽNICE (lib_deps)
; ------------------------------------------------------------
; PRAVILA VERZIONIRANJA:
;   @ X.Y.Z   = točna verzija — zamrznjeno
;   @ ^X.Y.Z  = minor/patch nadgradnje dovoljene, ne major
;   .zip URL  = snapshot brez Git clone (izogne se .gitattributes napaki na Windows)
;
; LOKALNE KNJIŽNICE (v src/ — PIO jih najde avtomatsko, niso tukaj):
;   src/TCA9554.h/.cpp              ← Rob Tillaart TCA9554 v0.1.2
;   src/esp_lcd_touch_axs15231b.h/.cpp ← Waveshare AXS15231B touch BSP
; ------------------------------------------------------------
lib_deps =

    ; ================================================================
    ; DISPLAY GONILNIK — GFX Library for Arduino
    ; ================================================================
    ; Waveshare demo paket (library.properties) potrjuje verzijo 1.6.0.
    ; ⚠ ZAMRZNJENO na točno verzijo 1.6.0.
    ;   Ime paketa v PIO registry: "GFX Library for Arduino" (z presledki!).
    ;   Gonilnik: Arduino_ESP32QSPI + Arduino_AXS15231B
    ; Repo: https://github.com/moononournation/Arduino_GFX
    moononournation/GFX Library for Arduino @ 1.6.5
    ; ================================================================
    ; LVGL GUI FRAMEWORK — v9.2.2
    ; ================================================================
    ; ⚠ ZAMRZNJENO na točno verzijo 9.2.2 — potrjeno iz Waveshare demo paketa.
    ; ⚠ API v9 ≠ v8: lv_display_flush_ready() ne lv_disp_flush_ready() itd.
    ;   Naš hal_display.cpp uporablja v9 API.
    ; Repo: https://github.com/lvgl/lvgl
    lvgl/lvgl @ 9.2.2

    ; ================================================================
    ; LED ANIMACIJE — FastLED
    ; ================================================================
    ; WS2815 LED verige (IO39 → MUX → 10 podverig, IO40 → 144 signalnih LED).
    ; ⚠ Ko je IO45 HIGH (WLED aktiven), FastLED.show() NE kliči!
    ; Repo: https://github.com/FastLED/FastLED
    fastled/FastLED @ ^3.7.0

    ; ================================================================
    ; WEB SERVER — ESP32Async organizacija
    ; ================================================================
    ; ⚠ me-no-dev/ESPAsyncWebServer ARHIVIRAN jan 2025 — NE UPORABI!
    ;   Nima ArduinoJson v7 podpore, nima ESP32-S3 fixov.
    ;
    ; ESP32Async = uradni naslednik mathieucarbou forka, na PlatformIO registry.
    ;   Podpira: ArduinoJson v7, ESP32-S3, pioarduino platformo,
    ;            serveStatic() z gzip, multipart OTA upload.
    ; Repo: https://github.com/ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.3.2

    ; ================================================================
    ; TOF SENZORJI — Pololu VL53L0X
    ; ================================================================
    ; 6x VL53L0X (TOF200C/TOF400C) na Wire1 (IO17/IO18) prek TCA9548A MUX.
    ; TCA9548A gonilnik implementiran lastno v hal_tof.cpp (ni zunanja lib).
    ; Repo: https://github.com/pololu/vl53l0x-arduino
    pololu/VL53L1X @ ^1.3.1

    ; ================================================================
    ; RADAR SENZORJI — LD2410Async
    ; ================================================================
    ; 4x HLK-LD2410C prek SC16IS752 I2C→UART bridge na Wire1.
    ; ⚠ Ni na PlatformIO registry — ZIP snapshot (izogne se .gitattributes napaki).
    ; Repo: https://github.com/lizardking/LD2410Async
    https://github.com/lizardking/LD2410Async/archive/refs/heads/master.zip

    ; ================================================================
    ; I2C→UART BRIDGE — SC16IS752 (TD-er)
    ; ================================================================
    ; Dual UART bridge za 4x LD2410C radarje prek Wire1.
    ; ⚠ Ni na PlatformIO registry — ZIP snapshot (izogne se .gitattributes napaki).
    ; ⚠ Preveriti ali CJMCU breakout modul ima IRQ pin na headerju.
    ; Repo: https://github.com/TD-er/SC16IS752
    https://github.com/TD-er/SC16IS752/archive/refs/heads/master.zip

    ; ================================================================
    ; JSON — ArduinoJson v7
    ; ================================================================
    ; ⚠ NE ZAMENJAJ z v6 — web_ui.cpp in config_mgr.cpp zahtevata v7 API!
    ;   v6: DynamicJsonDocument doc(1024);  v7: JsonDocument doc;
    ; Repo: https://github.com/bblanchon/ArduinoJson
    bblanchon/ArduinoJson @ ^7.2.0

; ============================================================
; KNJIŽNICE KI JIH NAMERNO NE DODAJAMO (in zakaj)
; ============================================================
;
; me-no-dev/AsyncTCP + me-no-dev/ESPAsyncWebServer
;   ARHIVIRANI jan 2025. Brez ArduinoJson v7, brez ESP32-S3 fixov.
;   Nadomestilo: ESP32Async (zgoraj).
;
; SensorLib (lewisxhe) in bb_captouch
;   Touch rešen z lokalnimi src/TCA9554.h + src/esp_lcd_touch_axs15231b.h.
;   Kopirano iz Waveshare demo — kompatibilno z AXS15231B.
;   Dodajanje SensorLib bi povzročilo konflikte.
;
; TFT_eSPI
;   Waveshare verzija ni kompatibilna s standardno PIO verzijo.
;   Arduino_GFX je čistejša alternativa.
;
; MCP23017 (katerakoli generična)
;   Krmilimo lastno v hal_gpio.cpp — specifična INT sekvenca zahteva
;   branje INTCAP (0x10/0x11) PRED INTFLAG (0x0E/0x0F).
;
; Wire / SPI / LittleFS / Preferences / NVS
;   Vgrajene v ESP32 Arduino framework.
;   Wire  → interni bus (IO7/IO8) — Waveshare BSP, NE inicializiramo!
;   Wire1 → senzorski bus (IO17/IO18) — naš bsp.cpp
;
; XPowersLib (AXP2101 PMU)
;   Backlight upravljan direktno prek IO6. Dodaj če rabiš battery monitoring.
; ============================================================
