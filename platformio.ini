; ============================================================
; platformio.ini — Park_auto
; Verzija: 1.0.14-dev  |  Datum: 2026-05
; Changelog:  CHANGELOG.md
; Odločitve:  Doc/decisions.md
; Hardware:   Waveshare ESP32-S3-Touch-LCD-3.5B | 16 MB Flash | 8 MB OPI PSRAM
; ============================================================

[env:parking_esp32s3]

; ------------------------------------------------------------
; PLATFORMA IN BOARD
; ------------------------------------------------------------
; ⚠ ZAMRZNJENO na 55.03.38 — espressif32@6.x NE DELUJE (bootloader bug v OPI PSRAM init)
; ⚠ NE nadgrajevati brez testa — ADR-001, CHANGELOG.md
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip

; ⚠ devkitc-1, NE devkitm-1 (različna USB CDC konfiguracija)
; Waveshare ne zagotavlja uradnega PIO board JSON — devkitc-1 je funkcionalno enakovreden,
; pine konfiguriramo v bsp.cpp / config.h.
board = esp32-s3-devkitc-1

framework = arduino

; fix_build_env.py MORA biti prva skripta — popravlja esp-dsp symlink + .piopm BOM
; (Doc/fresh_klon_problem.md)
extra_scripts =
    pre:scripts/fix_build_env.py
    pre:scripts/compress_assets.py
src_filter = +<*> -<files/>

; ------------------------------------------------------------
; FLASH IN MEMORY KONFIGURACIJA
; ------------------------------------------------------------
; ⚠ memory_type = qio_opi — potrjeno iz Waveshare boards.txt. NE spreminjati. (ADR-002)
; ⚠ flash_mode = dio je pravilen — ROM bere v DIO, bootloader nato preklopi v QIO.
; ⚠ NE DODAJAJ -mfix-esp32-psram-cache-issue — samo za LX6, na S3 povzroči boot loop.
board_build.flash_size          = 16MB
board_upload.flash_size         = 16MB
board_build.flash_mode          = dio
board_build.f_flash             = 80000000L
board_build.psram_type          = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions          = partitions_custom.csv
board_build.filesystem          = littlefs

; ------------------------------------------------------------
; UPLOAD IN MONITOR
; ------------------------------------------------------------
; Znižaj upload_speed na 460800 ob nestabilnih uploadih.
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, colorize

; ------------------------------------------------------------
; BUILD FLAGS
; ------------------------------------------------------------
build_flags =

    ; PSRAM — brez tega ps_malloc() ne deluje
    -DBOARD_HAS_PSRAM

    ; LVGL — poišče lv_conf.h v include/ (ADR-011)
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -Iinclude
    -I$PROJECT_DIR/include

    ; Display pini — AXS15231B prek QSPI (NE SPI, 4 podatkovne linije, ni MISO/RST)
    -DLCD_HOR_RES=320
    -DLCD_VER_RES=480
    -DLCD_BL_PIN=6
    -DLCD_QSPI_CS=12
    -DLCD_QSPI_CLK=5
    -DLCD_QSPI_D0=1
    -DLCD_QSPI_D1=2
    -DLCD_QSPI_D2=3
    -DLCD_QSPI_D3=4

    ; Touch — interni I2C bus (Wire, IO7/IO8). NE inicializiramo sami — BSP upravlja. (ADR-009)
    -DTOUCH_SDA=7
    -DTOUCH_SCL=8

    ; Verzija — sinhronizirati s config.h FW_VERSION_STRING
    -DVERSION_STRING=\"1.0.14-dev\"

    ; LOG_LEVEL: 0=ERROR 1=WARN 2=INFO 3=DEBUG
    -DLOG_LEVEL=3

    ; CORE_DEBUG_LEVEL: vklopi log_e/log_w/log_i v Arduino knjižnicah (AsyncTCP, itd.)
    ; 1=ERROR only (produkcija), 3=INFO (razvoj)
    -DCORE_DEBUG_LEVEL=1

    ; FreeRTOS core dodelitev
    ; ⚠ NE DODAJ -DARDUINO_EVENT_RUNNING_CORE — framework ga že definira → "redefined" error (ADR-008)
    -DARDUINO_RUNNING_CORE=1

    ; USB CDC (ESP32-S3 native USB) — omogoča while(!Serial) in zajem startup logov
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; AsyncTCP na Core1 (APP core) — NE Core0 (WiFi/LwIP core). (ADR-004)
    ; ⚠ To je C preprocessor macro (AsyncTCP.h), NE sdkconfig parameter.
    -D CONFIG_ASYNC_TCP_STACK_SIZE=4096
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1

; ------------------------------------------------------------
; SDK KONFIGURACIJA — LwIP optimizacija za 1 klienta
; ------------------------------------------------------------
; ⚠ custom_sdkconfig, NE sdkconfig.defaults — pri Arduino/pioarduino deluje samo to. (ADR-006)
; ⚠ Zahteva clean build (.pio/build/ počisti) po spremembi.
custom_sdkconfig =
    CONFIG_LWIP_MAX_ACTIVE_TCP=6
    CONFIG_LWIP_PBUF_POOL_SIZE=6
    CONFIG_LWIP_PBUF_POOL_BUFSIZE=1600
    CONFIG_LWIP_IRAM_OPTIMIZATION=n
    CONFIG_ASYNC_TCP_QUEUE_SIZE=8
    CONFIG_ASYNC_TCP_STACK_SIZE=4096

; ------------------------------------------------------------
; KNJIŽNICE
; ------------------------------------------------------------
; Verzioniranje: @ X.Y.Z = zamrznjeno | @ ^X.Y.Z = minor/patch dovoljeni
; .zip URL = snapshot (izogne se .gitattributes napaki na Windows)
; Lokalne knjižnice v src/ (PIO jih najde sam): TCA9554, esp_lcd_touch_axs15231b
lib_deps =

    ; ⚠ ZAMRZNJENO na 1.6.5 — Waveshare demo potrjuje. Ime paketa Z presledki!
    moononournation/GFX Library for Arduino @ 1.6.5

    ; ⚠ ZAMRZNJENO na 9.2.2 — Waveshare demo. v9 API ≠ v8 API. (ADR-011)
    lvgl/lvgl @ 9.2.2

    ; WS2815 LED verige. ⚠ Ko je IO45 HIGH (WLED aktiven), FastLED.show() NE kliči!
    fastled/FastLED @ ^3.7.0

    ; ⚠ me-no-dev — NE sinhroni WebServer, NE ESP32Async, NE mathieucarbou. (ADR-003)
    me-no-dev/AsyncTCP
    me-no-dev/ESPAsyncWebServer

    ; 6× VL53L0X na Wire1 prek TCA9548A MUX
    pololu/VL53L1X @ ^1.3.1

    ; ⚠ ZIP snapshot — NE .git URL (Windows .gitattributes napaka)
    https://github.com/lizardking/LD2410Async/archive/refs/heads/master.zip
    https://github.com/TD-er/SC16IS752/archive/refs/heads/master.zip

    ; ⚠ NE zamenjaj z v6 — web_ui.cpp in config_mgr.cpp zahtevata v7 API
    bblanchon/ArduinoJson @ ^7.2.0

; ------------------------------------------------------------
; KNJIŽNICE KI JIH NAMERNO NE DODAJAMO
; ------------------------------------------------------------
; ESP32Async/AsyncTCP + ESP32Async/ESPAsyncWebServer → ADR-003
; SensorLib / bb_captouch → touch rešen z lokalnimi src/ datotekami (ADR-008)
; TFT_eSPI → Waveshare verzija ≠ PIO standard; Arduino_GFX je zamenjava
; MCP23017 generična → hal_gpio.cpp zahteva specifično INT sekvenco (ADR-010)
; Wire/SPI/LittleFS/Preferences → vgrajene v framework
; XPowersLib (AXP2101) → backlight je direktno IO6; dodaj le ob battery monitoringu
