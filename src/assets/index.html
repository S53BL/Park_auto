<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking ESP32</title>
<link rel="stylesheet" href="/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────── -->
<div id="topbar">
  <span class="logo">P·ESP32</span>
  <nav class="nav-tabs" id="nav">
    <button class="nav-tab active" onclick="nav('status')">Status</button>
    <button class="nav-tab"        onclick="nav('settings')">Nastavitve</button>
    <button class="nav-tab"        onclick="nav('vehicles')">Vozila</button>
    <button class="nav-tab"        onclick="nav('logs')">Logi</button>
    <button class="nav-tab"        onclick="nav('system')">Sistem</button>
  </nav>
  <div id="wifi-dot" title="WiFi status"></div>
</div>

<!-- ── CONTENT ────────────────────────────────────────── -->
<div id="content">

  <!-- STATUS -->
  <div id="page-status" class="page active"></div>

  <!-- NASTAVITVE -->
  <div id="page-settings" class="page"></div>

  <!-- VOZILA -->
  <div id="page-vehicles" class="page"></div>

  <!-- LOGI -->
  <div id="page-logs" class="page"></div>

  <!-- SISTEM -->
  <div id="page-system" class="page"></div>

</div>

<!-- ── CONFIRM DIALOG (skupen za vse strani) ──────────── -->
<div class="dialog-overlay" id="confirm-overlay">
  <div class="dialog-box">
    <h3 id="confirm-title">Potrditev</h3>
    <p  id="confirm-msg">Ali ste prepričani?</p>
    <div class="dialog-actions">
      <button class="btn" onclick="confirmCancel()">Prekliči</button>
      <button class="btn btn-danger" id="confirm-ok-btn" onclick="confirmOk()">Potrdi</button>
    </div>
  </div>
</div>

<!-- ── ALPINE.JS (lokalna kopija — brez CDN) ──────────── -->
<script src="/alpine.min.js" defer></script>

<!-- ── CORE SPA ROUTER ────────────────────────────────── -->
<script>
// ── Stanje ───────────────────────────────────────────────
const _loaded  = {};           // kateri JS-ji so že naloženi
const _timers  = {};           // setInterval handle-ji po strani
let   _current = 'status';    // trenutna stran

// Moduli: ime → pot JS datoteke
const PAGES = {
  status:   '/status.js',
  settings: '/settings.js',
  vehicles: '/vehicles.js',
  logs:     '/logs.js',
  system:   '/system.js',
};

// ── Navigacija ───────────────────────────────────────────
function nav(id) {
  if (id === _current) return;

  // Skriji staro stran, ustavi njen polling
  document.getElementById('page-' + _current).classList.remove('active');
  document.querySelectorAll('.nav-tabs .nav-tab').forEach((btn, i) => {
    btn.classList.toggle('active', Object.keys(PAGES)[i] === id);
  });
  if (_timers[_current]) { clearInterval(_timers[_current]); delete _timers[_current]; }

  _current = id;

  // Pokaži novo stran
  document.getElementById('page-' + id).classList.add('active');

  // Lazy-load JS za to stran (enkrat)
  if (!_loaded[id]) {
    _loaded[id] = true;
    const sc = document.createElement('script');
    sc.src = PAGES[id];
    sc.onload = () => { if (typeof window['page_' + id] === 'function') window['page_' + id](); };
    sc.onerror = () => {
      document.getElementById('page-' + id).innerHTML =
        '<div class="empty-state">Napaka pri nalaganju ' + PAGES[id] + '</div>';
    };
    document.head.appendChild(sc);
  } else {
    // JS je že naložen — pokliči init funkcijo strani
    if (typeof window['page_' + id] === 'function') window['page_' + id]();
  }
}

// ── Skupni polling registrar ─────────────────────────────
// Vsaka stran pokliče registerPoller(id, fn, intervalMs)
window.registerPoller = function(pageId, fn, ms) {
  if (_timers[pageId]) clearInterval(_timers[pageId]);
  fn(); // takoj ob aktivaciji
  _timers[pageId] = setInterval(fn, ms);
};

window.clearPoller = function(pageId) {
  if (_timers[pageId]) { clearInterval(_timers[pageId]); delete _timers[pageId]; }
};

// ── WiFi status dot ──────────────────────────────────────
async function _updateWifiDot() {
  try {
    const r = await fetch('/api/status', { signal: AbortSignal.timeout(3000) });
    const d = await r.json();
    const dot = document.getElementById('wifi-dot');
    const ok = d.wifi && d.wifi.connected;
    dot.className = ok ? 'ok' : 'err';
    dot.title = ok ? 'WiFi: ' + (d.wifi.ip || '?') : 'WiFi: nepovezan';
  } catch {
    document.getElementById('wifi-dot').className = 'err';
  }
}

// ── Confirm dialog (skupen) ──────────────────────────────
let _confirmCallback = null;
window.showConfirm = function(title, msg, onOk, dangerLabel) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  document.getElementById('confirm-ok-btn').textContent = dangerLabel || 'Potrdi';
  _confirmCallback = onOk;
  document.getElementById('confirm-overlay').classList.add('open');
};
window.confirmOk = function() {
  document.getElementById('confirm-overlay').classList.remove('open');
  if (_confirmCallback) { _confirmCallback(); _confirmCallback = null; }
};
window.confirmCancel = function() {
  document.getElementById('confirm-overlay').classList.remove('open');
  _confirmCallback = null;
};

// ── API helper ───────────────────────────────────────────
window.api = {
  async get(path) {
    const r = await fetch(path, { signal: AbortSignal.timeout(5000) });
    if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(8000)
    });
    if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    return r.json();
  },
  async del(path) {
    const r = await fetch(path, { method: 'DELETE', signal: AbortSignal.timeout(5000) });
    if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    return r.json();
  }
};

// ── Format helpers ───────────────────────────────────────
window.fmt = {
  uptime(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const ss = s % 60;
    if (h > 0) return h + 'h ' + String(m).padStart(2,'0') + 'm';
    return m + 'm ' + String(ss).padStart(2,'0') + 's';
  },
  bytes(b) {
    if (b >= 1048576) return (b/1048576).toFixed(1) + ' MB';
    if (b >= 1024)    return (b/1024).toFixed(0) + ' KB';
    return b + ' B';
  },
  countdown(ms) {
    if (!ms || ms <= 0) return '--:--';
    const s = Math.ceil(ms / 1000);
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }
};

// ── Boot ─────────────────────────────────────────────────
(function boot() {
  // Naloži prvo stran (status) takoj
  const sc = document.createElement('script');
  sc.src = PAGES.status;
  sc.onload = () => { _loaded.status = true; if (typeof page_status === 'function') page_status(); };
  document.head.appendChild(sc);

  // WiFi dot polling
  _updateWifiDot();
  setInterval(_updateWifiDot, 10000);
})();
</script>

</body>
</html>
