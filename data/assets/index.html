<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking ESP32</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231e2030'/><text x='50' y='72' font-size='64' text-anchor='middle' font-family='sans-serif' fill='%2306b6d4'>P</text></svg>">
<link rel="stylesheet" href="/style.css">
<!-- Fonti: sistemski fallback (Consolas / Segoe UI) — woff2 datotek ni na LittleFS -->
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────── -->
<div id="topbar">
  <span class="logo">P·ESP32</span>
  <nav class="nav-tabs" id="nav">
    <button class="nav-tab active" onclick="nav('settings')">Nastavitve</button>
    <button class="nav-tab"        onclick="nav('diagnostika')">Diagnostika</button>
    <button class="nav-tab"        onclick="nav('logs')">Logi</button>
    <button class="nav-tab"        onclick="nav('system')">Sistem</button>
    <button class="nav-tab"        onclick="nav('vehicles')">Vozila</button>
    <button class="nav-tab"        onclick="nav('alarm')">Alarm</button>
    <button class="nav-tab"        onclick="nav('party')">Party</button>
  </nav>
</div>

<!-- ── CONTENT ────────────────────────────────────────── -->
<div id="content">

  <!-- NASTAVITVE (prva stran ob odprtju) -->
  <div id="page-settings" class="page active"></div>

  <!-- DIAGNOSTIKA (pull na klik) -->
  <div id="page-diagnostika" class="page"></div>

  <!-- LOGI (polling 5s) -->
  <div id="page-logs" class="page"></div>

  <!-- SISTEM (pull na klik) -->
  <div id="page-system" class="page"></div>

  <!-- VOZILA (pull na klik) -->
  <div id="page-vehicles" class="page"></div>

  <!-- ALARM (polling 3s) -->
  <div id="page-alarm" class="page"></div>

  <!-- PARTY (polling 3s) -->
  <div id="page-party" class="page"></div>

</div>

<!-- ── CONFIRM DIALOG (skupen za vse strani) ──────────── -->
<div class="dialog-overlay" id="confirm-overlay">
  <div class="dialog-box">
    <h3 id="confirm-title">Potrditev</h3>
    <p  id="confirm-msg">Ali ste prepričani?</p>
    <div class="dialog-actions">
      <button class="btn" onclick="confirmCancel()">Prekliči</button>
      <button class="btn btn-danger" id="confirm-ok-btn" onclick="confirmOk()">Potrdi</button>
    </div>
  </div>
</div>

<!-- ── ALPINE.JS (lokalna kopija — brez CDN) ──────────── -->
<script src="/alpine.min.js" defer></script>

<!-- ── CORE SPA ROUTER ────────────────────────────────── -->
<script>
// ── Stanje ───────────────────────────────────────────────
const _loaded  = {};
const _timers  = {};
let   _current = 'settings';   // prva stran je Nastavitve

const PAGES = {
  settings:   '/settings.js',
  diagnostika:'/diagnostika.js',
  logs:       '/logs.js',
  system:     '/system.js',
  vehicles:   '/vehicles.js',
  alarm:      '/alarm.js',
  party:      '/party.js',
};

// ── Navigacija ───────────────────────────────────────────
function nav(id) {
  if (id === _current) return;

  document.getElementById('page-' + _current).classList.remove('active');
  document.querySelectorAll('.nav-tabs .nav-tab').forEach((btn, i) => {
    btn.classList.toggle('active', Object.keys(PAGES)[i] === id);
  });
  if (_timers[_current]) { clearInterval(_timers[_current]); delete _timers[_current]; }

  _current = id;
  document.getElementById('page-' + id).classList.add('active');

  if (!_loaded[id]) {
    _loaded[id] = true;
    const sc = document.createElement('script');
    sc.src = PAGES[id];
    sc.onload = () => { if (typeof window['page_' + id] === 'function') window['page_' + id](); };
    sc.onerror = () => {
      document.getElementById('page-' + id).innerHTML =
        '<div class="empty-state">Napaka pri nalaganju ' + PAGES[id] + '</div>';
    };
    document.head.appendChild(sc);
  } else {
    if (typeof window['page_' + id] === 'function') window['page_' + id]();
  }
}

// ── Skupni polling registrar ─────────────────────────────
window.registerPoller = function(pageId, fn, ms) {
  if (_timers[pageId]) clearInterval(_timers[pageId]);
  fn();
  _timers[pageId] = setInterval(fn, ms);
};

window.clearPoller = function(pageId) {
  if (_timers[pageId]) { clearInterval(_timers[pageId]); delete _timers[pageId]; }
};

// ── Confirm dialog ───────────────────────────────────────
let _confirmCallback = null;
window.showConfirm = function(title, msg, onOk, dangerLabel) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  document.getElementById('confirm-ok-btn').textContent = dangerLabel || 'Potrdi';
  _confirmCallback = onOk;
  document.getElementById('confirm-overlay').classList.add('open');
};
window.confirmOk = function() {
  document.getElementById('confirm-overlay').classList.remove('open');
  if (_confirmCallback) { _confirmCallback(); _confirmCallback = null; }
};
window.confirmCancel = function() {
  document.getElementById('confirm-overlay').classList.remove('open');
  _confirmCallback = null;
};

// ── API helper ───────────────────────────────────────────
window.api = {
  async get(path) {
    const r = await fetch(path, { signal: AbortSignal.timeout(5000) });
    if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(8000)
    });
    if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    return r.json();
  },
  async del(path) {
    const r = await fetch(path, { method: 'DELETE', signal: AbortSignal.timeout(5000) });
    if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    return r.json();
  }
};

// ── Format helpers ───────────────────────────────────────
window.fmt = {
  uptime(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const ss = s % 60;
    if (h > 0) return h + 'h ' + String(m).padStart(2,'0') + 'm';
    return m + 'm ' + String(ss).padStart(2,'0') + 's';
  },
  bytes(b) {
    if (b >= 1048576) return (b/1048576).toFixed(1) + ' MB';
    if (b >= 1024)    return (b/1024).toFixed(0) + ' KB';
    return b + ' B';
  },
  countdown(s) {
    if (!s || s <= 0) return '--:--';
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }
};

// ── Boot — naloži Nastavitve kot prvo stran ──────────────
// DOMContentLoaded čaka da alpine.min.js (defer) konča prenos IN izvajanje.
// S tem je settings.js prenos serializiran — ne tekmuje z 16 KB alpine.min.js.
// Brez tega: 3 vzporedne zahteve (style.css + alpine.min.js + settings.js) +
// TCP self-connect iz wifiTask = 5 konekcij, MAX_ACTIVE_TCP=4 zavrne 5. z RST.
document.addEventListener('DOMContentLoaded', function() {
  const sc = document.createElement('script');
  sc.src = PAGES.settings;
  sc.onload = () => { _loaded.settings = true; if (typeof page_settings === 'function') page_settings(); };
  sc.onerror = () => {
    document.getElementById('page-settings').innerHTML =
      '<div class="empty-state">Napaka pri nalaganju ' + PAGES.settings + '</div>';
  };
  document.head.appendChild(sc);
});
</script>

</body>
</html>
